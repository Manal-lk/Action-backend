version: "3.9"

services:
  action-plan-api:
    container_name: action_plan_backend
    build:
      context: .
    ports:
      - "8081:8081"
    depends_on:
      - postgres

  redis:
    image: "redis:alpine"
    volumes:
    - postgres:/var/lib/redis
    ports:
    - "6380:6379"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ACTION_PLAN_DB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5435:5432"
    volumes:
      - postgres:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.4
    container_name: keycloak
    environment:
      KEYCLOAK_ADMIN_PASSWORD : admin
      KEYCLOAK_ADMIN: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/ACTION_PLAN_DB
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: admin
      KC_DB_SCHEMA: keycloak
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    command:
      - start-dev
      - --import-realm
    volumes:
      - ./keycloak/realms:/opt/keycloak/data/import/
volumes:
  postgres: